<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2196F3">
  <title>健身助手 - 私人健身小程序</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title">健身助手</h1>
    <button class="btn-filter" id="btnFilter" title="筛选">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
    </button>
  </header>

  <!-- Search Bar -->
  <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索动作...">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Export/Import bar (shown on favorites page) -->
    <div id="exportBar" class="export-bar hidden">
      <button id="btnExport" class="btn-export">导出收藏</button>
      <button id="btnImport" class="btn-import">导入收藏</button>
      <input type="file" id="importFile" accept=".json" class="hidden">
    </div>

    <!-- Exercise Grid -->
    <div id="exerciseGrid" class="exercise-grid"></div>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state hidden">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M16 2v6M8 2v6M3 10h18M5 5h14a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"></path>
      </svg>
      <p>未找到相关动作</p>
    </div>
  </main>

  <!-- Back to Top -->
  <button id="btnBackToTop" class="btn-back-to-top hidden" title="返回顶部">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>动作库</span>
    </button>
    <button class="nav-item" data-page="favorite">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      <span>收藏</span>
    </button>
    <button class="nav-item" data-page="random">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 3 21 3 21 8"></polyline>
        <polyline points="8 21 3 21 3 16"></polyline>
        <line x1="3" y1="16" x2="14" y2="5"></line>
        <line x1="10" y1="5" x2="14" y2="5"></line>
        <line x1="14" y1="9" x2="14" y2="5"></line>
        <line x1="10" y1="19" x2="14" y2="19"></line>
        <line x1="14" y1="19" x2="14" y2="15"></line>
        <line x1="19" y1="10" x2="14" y2="15"></line>
      </svg>
      <span>随机</span>
    </button>
  </nav>

  <!-- Filter Modal -->
  <div id="filterModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>筛选</h2>
        <button class="btn-close" id="btnCloseFilter">×</button>
      </div>
      <div class="modal-body">
        <div class="filter-section">
          <h3>身体部位</h3>
          <div class="filter-tags" id="bodyPartTags"></div>
        </div>
        <div class="filter-section">
          <h3>器械</h3>
          <div class="filter-tags" id="equipmentTags"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btnResetFilter">重置</button>
        <button class="btn-primary" id="btnApplyFilter">应用</button>
      </div>
    </div>
  </div>

  <!-- Exercise Detail Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-detail">
      <div class="modal-header">
        <h2 id="detailTitle"></h2>
        <button class="btn-close" id="btnCloseDetail">×</button>
      </div>
      <div class="modal-body">
        <div class="detail-info">
          <div class="info-row">
            <span class="label">部位:</span>
            <span id="detailBodyPart" class="value"></span>
          </div>
          <div class="info-row">
            <span class="label">器械:</span>
            <span id="detailEquipment" class="value"></span>
          </div>
          <div class="info-row">
            <span class="label">目标:</span>
            <span id="detailTarget" class="value"></span>
          </div>
        </div>
        <div class="gif-container" id="gifContainer">
          <div class="gif-loading">加载动画中...</div>
          <img id="exerciseGif" class="exercise-gif hidden" alt="动作演示">
        </div>
        <div class="instructions">
          <h3>动作说明</h3>
          <ol id="detailInstructions"></ol>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-favorite" id="btnToggleFavorite">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span id="favoriteText">收藏</span>
        </button>
      </div>
    </div>
  </div>

  <script src="data/exercises.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // New version available, reload to apply
              window.location.reload();
            }
          });
        });
      });
    }
  </script>
</body>
</html>
